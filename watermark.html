<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Watermark Proof Tool — Yeni Graphics</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
<style>
:root{--teal:#15b6a6;--coral:#fb6f5d;--navy:#123b56;--cream:#f4efe7;--ink:#161824;--soft:#4a4d5e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
header{background:linear-gradient(135deg,var(--navy),#0d6f6c);color:#fff;padding:22px 32px;display:flex;justify-content:space-between;align-items:center;}
header h1{font-family:'Bricolage Grotesque';font-size:1.45rem;font-weight:700;}
header p{opacity:.75;font-size:.85rem;margin-top:3px;}
a.back{color:rgba(255,255,255,.7);font-size:.88rem;text-decoration:none;}
a.back:hover{color:#fff;}

.main{max-width:1100px;margin:0 auto;padding:32px 24px;}

/* Upload zone */
.upload-zone{
  border:2.5px dashed rgba(22,24,36,.22);border-radius:22px;
  padding:54px 32px;text-align:center;cursor:pointer;
  background:#fff;transition:.25s;margin-bottom:28px;
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--teal);background:rgba(21,182,166,.04);}
.upload-zone i{font-size:2.8rem;color:var(--teal);margin-bottom:14px;display:block;}
.upload-zone h3{font-family:'Bricolage Grotesque';font-size:1.25rem;font-weight:700;margin-bottom:8px;}
.upload-zone p{color:var(--soft);font-size:.92rem;}
.upload-zone input{display:none;}

/* Layout after upload */
.editor{display:none;gap:28px;}
.editor.show{display:grid;grid-template-columns:300px 1fr;}

.options{background:#fff;border-radius:20px;padding:26px;box-shadow:0 8px 24px -8px rgba(22,24,36,.12);align-self:start;}
.options h2{font-family:'Bricolage Grotesque';font-size:1.05rem;font-weight:700;margin-bottom:20px;color:var(--navy);}
.opt-field{margin-bottom:16px;}
.opt-field label{display:flex;justify-content:space-between;font-weight:600;font-size:.85rem;margin-bottom:6px;}
.opt-field label span{color:var(--soft);font-weight:400;}
.opt-field input[type=text],.opt-field select{
  width:100%;padding:10px 13px;border-radius:10px;
  border:1.6px solid rgba(22,24,36,.14);
  font-family:'Hanken Grotesk';font-size:.92rem;background:#fafafa;
}
.opt-field input[type=range]{width:100%;accent-color:var(--teal);}
.opt-field input[type=color]{width:48px;height:36px;border-radius:8px;border:1.6px solid rgba(22,24,36,.14);cursor:pointer;padding:2px;}
.color-row{display:flex;align-items:center;gap:10px;}
.color-row input[type=text]{flex:1;}

.btn{width:100%;padding:13px;border-radius:50px;border:none;font-weight:700;font-size:.95rem;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:#0e7d77;transform:translateY(-2px);}
.btn-coral{background:var(--coral);color:#fff;}
.btn-coral:hover{background:#e8523f;transform:translateY(-2px);}
.btn-outline{background:transparent;color:var(--navy);border:1.8px solid var(--navy);}
.btn-outline:hover{background:var(--navy);color:#fff;}

.canvas-wrap{background:#fff;border-radius:20px;padding:24px;box-shadow:0 8px 24px -8px rgba(22,24,36,.12);display:flex;flex-direction:column;align-items:center;}
.canvas-wrap h2{font-family:'Bricolage Grotesque';font-size:1.05rem;font-weight:700;margin-bottom:16px;color:var(--navy);align-self:flex-start;}
#previewCanvas{max-width:100%;border-radius:12px;box-shadow:0 8px 28px -8px rgba(22,24,36,.2);}

@media(max-width:768px){.editor.show{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <div>
    <h1><i class="fa-solid fa-lock"></i> Watermark Proof Tool</h1>
    <p>Protect your designs before sending previews to clients</p>
  </div>
  <a href="https://yeni-graphics.vercel.app" class="back">← Portfolio</a>
</header>

<div class="main">
  <!-- Upload Zone -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
       ondragover="event.preventDefault();this.classList.add('drag')"
       ondragleave="this.classList.remove('drag')"
       ondrop="handleDrop(event)">
    <i class="fa-solid fa-cloud-arrow-up"></i>
    <h3>Drop your design here or click to upload</h3>
    <p>JPG, PNG, WEBP supported · Original quality preserved on download</p>
    <input type="file" id="fileInput" accept="image/*" onchange="loadImage(this.files[0])"/>
  </div>

  <!-- Editor (shown after upload) -->
  <div class="editor" id="editor">
    <div class="options">
      <h2>Watermark Options</h2>

      <div class="opt-field">
        <label>Watermark Text</label>
        <input type="text" id="wmText" value="PROOF — Yeni Graphics" oninput="redraw()"/>
      </div>

      <div class="opt-field">
        <label>Opacity <span id="opacityVal">35%</span></label>
        <input type="range" id="wmOpacity" min="5" max="90" value="35" oninput="document.getElementById('opacityVal').textContent=this.value+'%';redraw()"/>
      </div>

      <div class="opt-field">
        <label>Color</label>
        <div class="color-row">
          <input type="color" id="wmColor" value="#ffffff" oninput="redraw()"/>
          <input type="text" id="wmColorText" value="#ffffff" oninput="syncColor(this.value)"/>
        </div>
      </div>

      <div class="opt-field">
        <label>Spacing</label>
        <select id="wmSpacing" onchange="redraw()">
          <option value="180">Dense</option>
          <option value="260" selected>Normal</option>
          <option value="380">Sparse</option>
        </select>
      </div>

      <div class="opt-field">
        <label>Font Size</label>
        <select id="wmSize" onchange="redraw()">
          <option value="24">Small</option>
          <option value="34" selected>Medium</option>
          <option value="48">Large</option>
        </select>
      </div>

      <button class="btn btn-teal" onclick="downloadImage()"><i class="fa-solid fa-download"></i> Download Watermarked Image</button>
      <button class="btn btn-outline" style="margin-top:10px" onclick="resetTool()"><i class="fa-solid fa-rotate-left"></i> Upload New Image</button>
    </div>

    <div class="canvas-wrap">
      <h2>Preview</h2>
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>
</div>

<canvas id="fullCanvas" style="display:none"></canvas>

<script>
let originalImage = null;
let originalFile = null;

function handleDrop(e){
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if(f && f.type.startsWith('image/')) loadImage(f);
}

function loadImage(file){
  if(!file) return;
  originalFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      document.getElementById('uploadZone').style.display = 'none';
      document.getElementById('editor').classList.add('show');
      redraw();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function syncColor(val){
  if(/^#[0-9a-fA-F]{6}$/.test(val)){
    document.getElementById('wmColor').value = val;
    redraw();
  }
}

function drawWatermark(canvas, img){
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  const text    = document.getElementById('wmText').value || 'PROOF — Yeni Graphics';
  const opacity = parseInt(document.getElementById('wmOpacity').value) / 100;
  const color   = document.getElementById('wmColor').value;
  const spacing = parseInt(document.getElementById('wmSpacing').value);
  const size    = parseInt(document.getElementById('wmSize').value);

  // Scale font size relative to canvas vs preview
  const scale = canvas.width / (document.getElementById('previewCanvas').width || canvas.width);
  const scaledSize = size * scale;
  const scaledSpacing = spacing * scale;

  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.fillStyle = color;
  ctx.font = `bold ${scaledSize}px 'Hanken Grotesk', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const diag = Math.sqrt(canvas.width ** 2 + canvas.height ** 2);
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.rotate(-35 * Math.PI / 180);

  for(let y = -diag; y < diag; y += scaledSpacing){
    for(let x = -diag; x < diag; x += scaledSpacing){
      ctx.fillText(text, x, y);
    }
  }
  ctx.restore();

  // Update color text input
  document.getElementById('wmColorText').value = color;
}

function redraw(){
  if(!originalImage) return;
  const canvas = document.getElementById('previewCanvas');
  const maxW = Math.min(originalImage.width, 800);
  const ratio = originalImage.height / originalImage.width;
  canvas.width  = maxW;
  canvas.height = Math.round(maxW * ratio);
  drawWatermark(canvas, originalImage);
}

function downloadImage(){
  if(!originalImage) return;
  const canvas = document.getElementById('fullCanvas');
  canvas.width  = originalImage.width;
  canvas.height = originalImage.height;
  drawWatermark(canvas, originalImage);
  const link = document.createElement('a');
  const name = originalFile ? 'proof-' + originalFile.name.replace(/\.[^.]+$/,'.png') : 'proof-design.png';
  link.download = name;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function resetTool(){
  originalImage = null;
  originalFile  = null;
  document.getElementById('uploadZone').style.display = '';
  document.getElementById('editor').classList.remove('show');
  document.getElementById('fileInput').value = '';
}
</script>
</body>
</html>
